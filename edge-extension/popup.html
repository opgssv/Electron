<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 350px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
    h2 { font-size: 16px; margin-top: 0; color: #333; }
    .btn { 
      display: block; width: 100%; padding: 10px; background: #1877f2; color: white;
      border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px; font-weight: bold;
      transition: background 0.2s;
    }
    .btn:hover { background: #166fe5; }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #5a6268; }
    
    .status { font-size: 13px; color: #666; text-align: center; margin-bottom: 15px; min-height: 18px; }
    
    .url-list-container { border: 1px solid #dee2e6; border-radius: 4px; background: white; max-height: 200px; overflow-y: auto; }
    .url-item { 
      padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 11px; 
      word-break: break-all; cursor: pointer; transition: background 0.1s;
    }
    .url-item:last-child { border-bottom: none; }
    .url-item:hover { background: #e9ecef; }
    .url-item-type { 
      display: inline-block; padding: 2px 4px; border-radius: 3px; 
      font-weight: bold; margin-right: 5px; color: white; 
    }
    .type-m3u8 { background: #e67e22; }
    .type-mp4 { background: #27ae60; }
    
    .empty-msg { padding: 20px; text-align: center; color: #999; font-style: italic; font-size: 12px; }
    .section-title { font-size: 12px; font-weight: bold; margin: 10px 0 5px 0; color: #555; }
  </style>
</head>
<body>
  <h2>Video Downloader Linker</h2>
  
  <button id="sendCurrent" class="btn">Send Current Page URL</button>
  
  <div class="status" id="statusText">Ready</div>

  <div id="blockedTip" style="display:none; background: #fff3cd; padding: 8px; border: 1px solid #ffeeba; border-radius: 4px; font-size: 11px; margin-bottom: 10px; color: #856404;">
    <b>Tip:</b> For <b>YouTube/Twitter</b>, click the button above. For <b>Blocked Sites</b>, click one of the <b>Detected URLs</b> below.
  </div>

  <div class="section-title">Detected Video URLs (m3u8 / mp4)</div>
  <div class="url-list-container" id="urlList">
    <div class="empty-msg">No videos detected yet. Refresh page or play video.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
